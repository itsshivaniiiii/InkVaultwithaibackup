# ===========================================
# Render Blueprint for InkVault
# https://render.com/docs/blueprint-spec
# ===========================================

services:
  - type: web
    name: inkvault
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: oregon  # Choose: oregon, ohio, frankfurt, singapore
    plan: free      # Options: free, starter, standard, pro
    branch: main
    
    # Health check settings
    healthCheckPath: /
    
    # Auto-deploy on push
    autoDeploy: true
    
    # Environment variables (set these in Render Dashboard)
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:8080
      - key: PORT
        value: 8080
      
      # Database connection string (set in Render Dashboard - keep secret)
      - key: ConnectionStrings__DefaultConnection
        sync: false  # Must be set manually in dashboard
      
      # SMTP Settings (set in Render Dashboard - keep secret)
      - key: SmtpSettings__Server
        sync: false
      - key: SmtpSettings__Port
        sync: false
      - key: SmtpSettings__SenderEmail
        sync: false
      - key: SmtpSettings__SenderPassword
        sync: false

# ===========================================
# IMPORTANT: After deploying, set these 
# environment variables in Render Dashboard:
#
# ConnectionStrings__DefaultConnection = your-azure-sql-connection-string
# SmtpSettings__Server = smtp.gmail.com
# SmtpSettings__Port = 587
# SmtpSettings__SenderEmail = your-email@gmail.com
# SmtpSettings__SenderPassword = your-app-password
# ===========================================
